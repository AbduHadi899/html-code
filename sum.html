<html>
    <body>
          

        <h1>javascript variable</h1>
        <p>sum of two number</p>
        <p id="result1"></p>
        <p>subtract of two number</p>
        <p id="result2"></p>
        <p>multiple of two number</p>
         <p id="result3"></p>
         <p>divide of two number</p>
         <p id="result4"></p>

<script>
    var num1 = 5;
    var num2 = 6;
    var sum =num1 + num2;
    var minus = num1-num2;
    var multiple = num1*num2;
    var divide = num1/num2
    document.getElementById("result1").innerHTML=
    "the total sum is : " + sum;

     document.getElementById("result2").innerHTML=
    "the total minus is : " + minus;

     document.getElementById("result3").innerHTML=
    "the total multiple is : " + multiple;

     document.getElementById("result4").innerHTML=
    "the total divide is : " + divide;
</script>

    </body>

</html>
