<html>
    <body>

         <h2>javascript object and its properties  </h2>

        <p>
            there are two different ways access an object properties
        </p>

        <p id="demo"></p>

        <script>
            // create an object:
            var person = {
                firstname: "Abdul Hadi",
                age:13,
            };

            // disply some data from the object:
            document.getElementById("demo").innerHTML = person.firstname + "am" +
            person.age +"years old"

        </script>
    </body>
</html>
