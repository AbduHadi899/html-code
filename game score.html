             <script>
                function showProfile() {
                    let name    = "Alex";
                    let myScore   = 70;
                    let highScore = null;
                    let Team;
                    let isTopScore = myScore == highScore;
                    let rank;
                    if (myScore >= 80) {
                        rank = "gold";
                    } else if (myScore >= 50) {
                        rank = "silver";
                    } else {
                        rank = "Bronze";
                    }
                
                    let hour = new Date().getHours();
                    let greeting;

                        greeting = "Good Morning!";
                    } else if (hour < 17) {
                        greeting = "good afternoon!";
                    } else {
                        greeting = "good evening!";
                    }
                   let stars = "";

let count = 0;

while (count < 5) {

stars = stars + "* ";

count = count + 1;

}

document.getElementById("name").innerHTML = name;

document.getElementById("score").innerHTML = myScore + " out of " + highScore;

                }
