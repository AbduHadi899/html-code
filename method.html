<html>
    <body>
        <h2>javascript string method</h2>
        <p>basic method</p>
        <script>
            var str = "AMAzInG";
            
            document.write(str.toUpperCase());
            document.write("<br>");
            document.write(str.toLowerCase());
            document.write("<br>");
            document.write(str.startsWith());
            document.write("<br>");
        </script>
    </body>
</html>
