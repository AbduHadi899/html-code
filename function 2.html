<html>
    <body>
        <p>a function can access variabledefined inside the function</p>
        <button type="button"onclick="myfunction()"click me!></button>
        <p id="demo"></p>

            var b = 5;
            function myfunction() {
                var a = 4;

            document.getElementById("demo2").innerHTML = b*a;

    </body>
